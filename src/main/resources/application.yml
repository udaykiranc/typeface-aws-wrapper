spring:
  application:
    name: aws-wrapper-service

server:
  port: 8081
  servlet:
    context-path: /

app:
  identity-service:
    public-key-uri: ${IDENTITY_SERVICE_PUBLIC_KEY_URI:http://localhost:8080/.well-known/jwks.json}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.typeface.aws_wrapper: DEBUG
